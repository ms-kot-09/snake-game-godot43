name: 🐍 Snake APK Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  GODOT_VERSION: 4.3.0
  EXPORT_NAME: SnakeGame
  PROJECT_PATH: .

jobs:
  build-android:
    name: 📱 Build Android APK
    runs-on: ubuntu-22.04

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install Android build tools
        run: |
          sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
            "platform-tools" \
            "build-tools;34.0.0" \
            "platforms;android-34" \
            "cmdline-tools;latest" \
            "ndk;25.1.8937393"

      - name: 🎮 Download Godot ${{ env.GODOT_VERSION }}
        run: |
          GODOT_URL="https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip"
          wget -q "$GODOT_URL" -O godot.zip
          unzip -q godot.zip
          mv Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64 /usr/local/bin/godot
          chmod +x /usr/local/bin/godot
          echo "Godot installed: $(godot --version)"

      - name: 📚 Download Export Templates
        run: |
          TEMPLATES_URL="https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz"
          wget -q "$TEMPLATES_URL" -O templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          unzip -q templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/
          echo "Templates installed"

      - name: 🔑 Generate debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkeypair \
            -keystore ~/.android/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" 2>/dev/null || true

      - name: ⚙️ Configure Godot editor settings
        run: |
          mkdir -p ~/.config/godot
          cat > ~/.config/godot/editor_settings-4.tres << EOF
          [gd_resource type="EditorSettings" format=3]
          [resource]
          export/android/android_sdk_path = "$ANDROID_SDK_ROOT"
          export/android/debug_keystore = "$HOME/.android/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          export/android/force_system_user = false
          export/android/timestamping_authority_url = ""
          export/android/shutdown_adb_on_exit = true
          EOF

      - name: 🔨 Import project
        run: |
          cd ${{ env.PROJECT_PATH }}
          timeout 60 godot --headless --import 2>&1 | tail -5 || true
          echo "Import done"

      - name: 🏗️ Export Android APK
        run: |
          mkdir -p builds/android
          cd ${{ env.PROJECT_PATH }}
          godot --headless --export-debug "Android" \
            "$GITHUB_WORKSPACE/builds/android/${{ env.EXPORT_NAME }}.apk"

      - name: ✅ Verify APK
        run: |
          ls -lh builds/android/
          file builds/android/${{ env.EXPORT_NAME }}.apk

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-Android-APK
          path: builds/android/${{ env.EXPORT_NAME }}.apk
          retention-days: 30

  # ── Auto-release on version tag ─────────────────────────────────────
  release:
    name: 🚀 GitHub Release
    needs: build-android
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: 📥 Download APK
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-Android-APK
          path: release/

      - name: 🎉 Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/${{ env.EXPORT_NAME }}.apk
          body: |
            ## 🐍 Snake Game — ${{ github.ref_name }}
            
            ### 📱 Android Install
            1. Download `SnakeGame.apk`
            2. Enable **"Install unknown apps"** in Android settings
            3. Tap the APK to install
            
            ### 🎮 Features
            - 15 built-in skins + custom RGB editor
            - Swipe controls optimised for mobile
            - Particle effects & smooth animations
            - Sound effects & settings
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
